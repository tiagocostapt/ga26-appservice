name: Pull Request Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'infra/**'
      - '.github/workflows/**'

jobs:
  code-analysis:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore src/

      - name: Build application
        run: dotnet build src/ -c Release --no-restore

      - name: Run tests
        run: dotnet test src/ -c Release --no-build --verbosity normal
        continue-on-error: true

  bicep-analysis:
    name: Bicep Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure CLI - Validate Bicep
        uses: azure/CLI@v1
        with:
          inlineScript: |
            echo "Validating main.bicep..."
            az bicep validate --file infra/main.bicep
            
            echo "Validating main.advanced.bicep..."
            az bicep validate --file infra/main.advanced.bicep
            
            echo "✓ All Bicep templates are valid"

      - name: Build Bicep templates
        run: |
          echo "Building main.bicep..."
          az bicep build --file infra/main.bicep --outfile /tmp/main.json
          
          echo "Building main.advanced.bicep..."
          az bicep build --file infra/main.advanced.bicep --outfile /tmp/main.advanced.json
          
          echo "✓ Bicep templates build successfully"

  publish-artifact:
    name: Publish Artifact
    runs-on: ubuntu-latest
    needs: code-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore src/

      - name: Build application
        run: dotnet build src/ -c Release --no-restore

      - name: Publish application
        run: dotnet publish src/ -c Release -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-publish-pr-${{ github.event.pull_request.number }}
          path: publish/
          retention-days: 5

  comment-on-pr:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [code-analysis, bicep-analysis, publish-artifact]
    if: always()
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const jobStatus = '${{ job.status }}' === 'success' ? '✅ All checks passed' : '❌ Some checks failed';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${jobStatus}\n\n- Code analysis\n- Bicep validation\n- Build artifact published`
            });
